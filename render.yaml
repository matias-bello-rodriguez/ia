# Render — Solo frontend Angular (Supabase)
# Build desde la raíz del repo para evitar problemas con Root Directory
# https://docs.render.com/blueprint-spec

services:
  - type: web
    runtime: static
    name: egis-app
    # Sin rootDir: build desde raíz del repo (package.json en raíz)
    buildCommand: npm run build
    staticPublishPath: angular/dist/egis-pro

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
